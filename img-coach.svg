<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="Diagram of how Career Launch Coach works: five steps from asking the goal and target role, to gathering real experience, producing a draft, explaining the choices, and tailoring or iterating. Below are three guardrails: never invents experience, no advice based on protected characteristics, and reminds users to protect private data.">
  <style>
    .ttl{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#111418}
    .sub{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
    .stepn{font:700 11px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f766e}
    .step{font:600 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#111418}
    .stepd{font:400 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
    .glabel{font:700 11px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0b5c55}
    .g{font:500 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#3d444e}
  </style>
  <rect width="760" height="320" fill="#ffffff"/>
  <text x="24" y="32" class="ttl">Career Launch Coach - How It Works</text>
  <text x="24" y="52" class="sub">A guided flow that builds on the user's real experience, never on invented details.</text>

  <!-- step boxes -->
  <g>
    <rect x="24" y="76" width="132" height="86" rx="10" fill="#f7f8fa" stroke="#e7e9ec"/>
    <text x="38" y="98" class="stepn">STEP 1</text>
    <text x="38" y="118" class="step">Ask the goal</text>
    <text x="38" y="136" class="stepd">Resume, cover letter,</text>
    <text x="38" y="151" class="stepd">or interview? Role?</text>

    <rect x="176" y="76" width="132" height="86" rx="10" fill="#f7f8fa" stroke="#e7e9ec"/>
    <text x="190" y="98" class="stepn">STEP 2</text>
    <text x="190" y="118" class="step">Gather facts</text>
    <text x="190" y="136" class="stepd">Real tasks, tools,</text>
    <text x="190" y="151" class="stepd">results. Ask if missing.</text>

    <rect x="328" y="76" width="132" height="86" rx="10" fill="#e7f2f0" stroke="#0f766e"/>
    <text x="342" y="98" class="stepn">STEP 3</text>
    <text x="342" y="118" class="step">Produce a draft</text>
    <text x="342" y="136" class="stepd">Action-verb bullets,</text>
    <text x="342" y="151" class="stepd">summary, or answer.</text>

    <rect x="480" y="76" width="132" height="86" rx="10" fill="#f7f8fa" stroke="#e7e9ec"/>
    <text x="494" y="98" class="stepn">STEP 4</text>
    <text x="494" y="118" class="step">Explain why</text>
    <text x="494" y="136" class="stepd">Brief reasoning behind</text>
    <text x="494" y="151" class="stepd">the key choices.</text>

    <rect x="632" y="76" width="104" height="86" rx="10" fill="#f7f8fa" stroke="#e7e9ec"/>
    <text x="646" y="98" class="stepn">STEP 5</text>
    <text x="646" y="118" class="step">Tailor</text>
    <text x="646" y="136" class="stepd">Iterate to a</text>
    <text x="646" y="151" class="stepd">specific job.</text>
  </g>

  <!-- arrows -->
  <g fill="#0f766e">
    <polygon points="160,115 172,119 160,123"/>
    <polygon points="312,115 324,119 312,123"/>
    <polygon points="464,115 476,119 464,123"/>
    <polygon points="616,115 628,119 616,123"/>
  </g>
  <g stroke="#cbd5d3" stroke-width="1.5">
    <line x1="156" y1="119" x2="161" y2="119"/>
    <line x1="308" y1="119" x2="313" y2="119"/>
    <line x1="460" y1="119" x2="465" y2="119"/>
    <line x1="612" y1="119" x2="617" y2="119"/>
  </g>

  <!-- guardrails band -->
  <rect x="24" y="196" width="712" height="96" rx="10" fill="#ffffff" stroke="#e7e9ec"/>
  <rect x="24" y="196" width="4" height="96" rx="2" fill="#0f766e"/>
  <text x="44" y="220" class="glabel">BUILT-IN GUARDRAILS</text>
  <text x="44" y="244" class="g">Never invents experience, skills, or metrics - it only rephrases what the user provides.</text>
  <text x="44" y="264" class="g">Never tailors advice around age, gender, race, name, or any protected characteristic.</text>
  <text x="44" y="284" class="g">Reminds users not to paste confidential or sensitive personal data.</text>
</svg>
