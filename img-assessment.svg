<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 372" width="760" height="372" role="img" aria-label="Bar chart of AI/ML leadership self-assessment scores by category. Technical Understanding 95 percent, Continuous Improvement 90, Stakeholder Communication 80, Ethical and Responsible AI 80, Project Management 75, Adoption Strategies 75, Change Readiness 60.">
  <style>
    .ttl{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#111418}
    .sub{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
    .cat{font:500 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#3d444e}
    .val{font:600 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#3d444e}
    .note{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
  </style>
  <rect width="760" height="372" fill="#ffffff"/>
  <text x="24" y="32" class="ttl">AI/ML Leadership Self-Assessment - Category Scores</text>
  <text x="24" y="52" class="sub">Percent of maximum score per category. Higher indicates greater self-rated proficiency.</text>

  <line x1="286" y1="68" x2="286" y2="304" stroke="#e7e9ec" stroke-width="1"/>

  <text x="274" y="85" text-anchor="end" class="cat">Technical Understanding</text>
  <rect x="286" y="72" width="380" height="16" rx="4" fill="#0f766e"/>
  <text x="674" y="85" class="val">95%</text>

  <text x="274" y="121" text-anchor="end" class="cat">Continuous Improvement</text>
  <rect x="286" y="108" width="360" height="16" rx="4" fill="#0f766e"/>
  <text x="654" y="121" class="val">90%</text>

  <text x="274" y="157" text-anchor="end" class="cat">Stakeholder Communication</text>
  <rect x="286" y="144" width="320" height="16" rx="4" fill="#0f766e"/>
  <text x="614" y="157" class="val">80%</text>

  <text x="274" y="193" text-anchor="end" class="cat">Ethical &amp; Responsible AI</text>
  <rect x="286" y="180" width="320" height="16" rx="4" fill="#0f766e"/>
  <text x="614" y="193" class="val">80%</text>

  <text x="274" y="229" text-anchor="end" class="cat">AI/ML Project Management</text>
  <rect x="286" y="216" width="300" height="16" rx="4" fill="#0f766e"/>
  <text x="594" y="229" class="val">75%</text>

  <text x="274" y="265" text-anchor="end" class="cat">AI/ML Adoption Strategies</text>
  <rect x="286" y="252" width="300" height="16" rx="4" fill="#0f766e"/>
  <text x="594" y="265" class="val">75%</text>

  <text x="274" y="301" text-anchor="end" class="cat">Change Readiness</text>
  <rect x="286" y="288" width="240" height="16" rx="4" fill="#0f766e"/>
  <text x="534" y="301" class="val">60%</text>

  <line x1="286" y1="322" x2="736" y2="322" stroke="#e7e9ec" stroke-width="1"/>
  <text x="24" y="346" class="note">Strongest areas are technical and improvement-focused. Change readiness is the clearest growth area -</text>
  <text x="24" y="362" class="note">preparing people and organizations for AI adoption, rather than building the models themselves.</text>
</svg>
