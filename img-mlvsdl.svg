<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 372" width="760" height="372" role="img" aria-label="Comparison of traditional machine learning and deep learning. Traditional ML suits structured tabular data with human-defined features, illustrated by customer churn prediction. Deep learning suits raw unstructured data where the model learns its own features, illustrated by medical image recognition.">
  <style>
    .ttl{font:600 17px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#111418}
    .sub{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
    .h{font:700 13px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0b5c55}
    .k{font:700 10.5px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#0f766e}
    .b{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#3d444e}
    .case{font:600 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#111418}
    .note{font:400 12px -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;fill:#6b7280}
  </style>
  <rect width="760" height="372" fill="#ffffff"/>
  <text x="24" y="32" class="ttl">Choosing the Right Approach: Machine Learning vs. Deep Learning</text>
  <text x="24" y="52" class="sub">The decision is driven by the shape of the data, not by which method is more advanced.</text>

  <!-- LEFT: traditional ML -->
  <rect x="24" y="72" width="348" height="232" rx="12" fill="#ffffff" stroke="#e7e9ec"/>
  <rect x="24" y="72" width="348" height="34" rx="12" fill="#f7f8fa"/>
  <rect x="24" y="96" width="348" height="10" fill="#f7f8fa"/>
  <text x="42" y="94" class="h">TRADITIONAL MACHINE LEARNING</text>

  <text x="42" y="128" class="k">DATA</text>
  <text x="42" y="146" class="b">Structured, tabular - already in clear fields</text>
  <text x="42" y="172" class="k">FEATURES</text>
  <text x="42" y="190" class="b">Defined by humans (contract length, charges)</text>
  <text x="42" y="216" class="k">STRENGTHS</text>
  <text x="42" y="234" class="b">Explainable, fast, works on smaller data</text>
  <text x="42" y="260" class="k">REAL-WORLD CASE</text>
  <text x="42" y="278" class="case">Customer churn prediction (telecom)</text>
  <text x="42" y="294" class="b">Logistic regression, decision tree, or SVM</text>

  <!-- RIGHT: deep learning -->
  <rect x="388" y="72" width="348" height="232" rx="12" fill="#ffffff" stroke="#0f766e"/>
  <rect x="388" y="72" width="348" height="34" rx="12" fill="#e7f2f0"/>
  <rect x="388" y="96" width="348" height="10" fill="#e7f2f0"/>
  <text x="406" y="94" class="h">DEEP LEARNING</text>

  <text x="406" y="128" class="k">DATA</text>
  <text x="406" y="146" class="b">Raw and unstructured - images, audio, text</text>
  <text x="406" y="172" class="k">FEATURES</text>
  <text x="406" y="190" class="b">Learned by the model, layer by layer</text>
  <text x="406" y="216" class="k">STRENGTHS</text>
  <text x="406" y="234" class="b">Finds patterns humans cannot hand-define</text>
  <text x="406" y="260" class="k">REAL-WORLD CASE</text>
  <text x="406" y="278" class="case">Medical image recognition (X-ray, MRI)</text>
  <text x="406" y="294" class="b">Convolutional neural network (CNN)</text>

  <!-- bottom rule + takeaway -->
  <line x1="24" y1="326" x2="736" y2="326" stroke="#e7e9ec" stroke-width="1"/>
  <text x="24" y="348" class="note">If the useful features are already known and the data is tabular, traditional ML is cheaper and easier to explain.</text>
  <text x="24" y="364" class="note">If the features are buried in raw data and no one can list them, deep learning is the only practical option.</text>
</svg>
